name: Backend Watchdog

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  check-and-recover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Probe backend and restart if needed
        env:
          HF_SPACE_REPO_ID: Virenn77/SpaceDebrisAI
          HF_SPACE_BASE_URL: https://virenn77-spacedebrisai.hf.space
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          WATCHDOG_SIM_TIMEOUT_SECONDS: "45"
          WATCHDOG_HEALTH_TIMEOUT_SECONDS: "15"
        run: python scripts/space_watchdog.py
