<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0d1b38"/>
      <stop offset="100%" stop-color="#020817"/>
    </radialGradient>
    <radialGradient id="planet" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="55%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </radialGradient>
    <radialGradient id="ocean" cx="60%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sat-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="planet-clip">
      <circle cx="30" cy="38" r="17"/>
    </clipPath>
  </defs>

  <!-- Outer circle background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="10" cy="10" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="52" cy="8" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="58" cy="22" r="0.7" fill="white" opacity="0.4"/>
  <circle cx="6" cy="28" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="56" cy="52" r="0.6" fill="white" opacity="0.4"/>
  <circle cx="8" cy="52" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="44" cy="5"  r="0.6" fill="white" opacity="0.5"/>
  <circle cx="18" cy="6"  r="0.7" fill="white" opacity="0.5"/>

  <!-- Earth (green planet with ocean patches) -->
  <circle cx="30" cy="38" r="17" fill="url(#planet)"/>
  <!-- Ocean patch -->
  <ellipse cx="34" cy="36" rx="8" ry="6" fill="url(#ocean)" opacity="0.55" clip-path="url(#planet-clip)"/>
  <!-- Cloud highlight -->
  <ellipse cx="26" cy="32" rx="6" ry="2.5" fill="white" opacity="0.12" clip-path="url(#planet-clip)"/>
  <!-- Atmosphere glow -->
  <circle cx="30" cy="38" r="17" fill="none" stroke="#4ade80" stroke-width="2.5" opacity="0.22"/>

  <!-- Green swoosh orbit (the big green arc from the image) -->
  <ellipse cx="30" cy="34" rx="25" ry="10" fill="none" stroke="#22c55e" stroke-width="2.8"
    stroke-dasharray="48 18" stroke-linecap="round"
    transform="rotate(-28 30 34)" opacity="0.92" filter="url(#glow)"/>

  <!-- Satellite body (upper-right) -->
  <g transform="translate(51,14) rotate(42)">
    <!-- Main body -->
    <rect x="-3.5" y="-2" width="7" height="4" fill="#e2e8f0" rx="1"/>
    <!-- Antenna -->
    <line x1="0" y1="-2" x2="0" y2="-5" stroke="#94a3b8" stroke-width="0.8"/>
    <circle cx="0" cy="-5.5" r="0.8" fill="#38bdf8"/>
    <!-- Left solar panel -->
    <rect x="-10" y="-1.2" width="5.5" height="2.4" fill="#38bdf8" rx="0.5" opacity="0.95"/>
    <line x1="-4.5" y1="0" x2="-4.5" y2="-1.2" stroke="#0ea5e9" stroke-width="0.4"/>
    <line x1="-7" y1="0" x2="-7" y2="-1.2" stroke="#0ea5e9" stroke-width="0.4"/>
    <!-- Right solar panel -->
    <rect x="4.5" y="-1.2" width="5.5" height="2.4" fill="#38bdf8" rx="0.5" opacity="0.95"/>
    <line x1="7" y1="0" x2="7" y2="-1.2" stroke="#0ea5e9" stroke-width="0.4"/>
    <line x1="9.5" y1="0" x2="9.5" y2="-1.2" stroke="#0ea5e9" stroke-width="0.4"/>
  </g>

  <!-- Debris particles (colored dots around the scene) -->
  <circle cx="15" cy="18" r="2.2" fill="#ef4444" opacity="0.85" filter="url(#glow)"/>
  <circle cx="48" cy="17" r="1.6" fill="#f97316" opacity="0.8"  filter="url(#glow)"/>
  <circle cx="11" cy="44" r="1.8" fill="#fbbf24" opacity="0.75" filter="url(#glow)"/>
  <circle cx="53" cy="46" r="1.3" fill="#a78bfa" opacity="0.8"  filter="url(#glow)"/>
  <circle cx="22" cy="10" r="1.2" fill="#ef4444" opacity="0.6"/>
  <circle cx="55" cy="34" r="1.0" fill="#f472b6" opacity="0.7"/>
  <circle cx="8"  cy="36" r="0.9" fill="#fb923c" opacity="0.65"/>

  <!-- Outer border ring -->
  <circle cx="32" cy="32" r="31" fill="none" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
</svg>
